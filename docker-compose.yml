version: '3.8'
services:
  docwatch:
    image: ghcr.io/duckiec/docwatch:latest
    build: .
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - docwatch_data:/app/data
    env_file:
      - .env
    restart: unless-stopped

volumes:
  docwatch_data:
